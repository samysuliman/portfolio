<h1 class="page-title">احجز تقييمك المجاني</h1><p class="muted">نحتاج معلومات بسيطة حتى نرشح لك المسار الأنسب.</p>
<div class="panel"><form data-demo-form>
<div class="form-grid">
<div class="field"><label>الاسم الكامل</label><input required placeholder="اكتب الاسم"></div>
<div class="field"><label>العمر</label><input required type="number" min="4" placeholder="العمر"></div>
<div class="field"><label>الدولة</label><input required placeholder="مثال: السعودية"></div>
<div class="field"><label>رقم واتساب</label><input required placeholder="+966..."></div>
<div class="field"><label>هدفك الأساسي</label><select required><option value="">اختر</option><option>تعلم القراءة</option><option>تحسين التلاوة</option><option>حفظ القرآن</option><option>الإجازة والسند</option></select></div>
<div class="field"><label>الوقت المفضل</label><select required><option>صباحًا</option><option>مساءً</option><option>مرن</option></select></div>
</div>
<button class="btn btn-primary" style="margin-top:22px;width:100%">إرسال طلب التقييم</button>
<div data-success class="notice hide" style="margin-top:18px">تم تسجيل الطلب تجريبيًا. في النسخة الحقيقية سيصل الطلب إلى لوحة الإدارة.</div>
</form></div></div></main>
