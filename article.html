<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مقال | سامي سليمان</title>
<meta id="metaDesc" name="description" content="مقال من موقع سامي سليمان"><meta name="robots" content="index,follow"><meta property="og:type" content="article"><meta id="ogTitle" property="og:title" content="مقال | سامي سليمان"><meta id="ogDesc" property="og:description" content=""><meta id="ogImage" property="og:image" content="assets/portrait-only.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="icon" href="assets/favicon.png" type="image/png"><link rel="stylesheet" href="assets/articles.css">
</head><body>
<nav class="nav"><div class="container nav-inner"><div class="brand-wrap"><img class="avatar" src="assets/portrait-only.jpg" alt="سامي سليمان"><a class="brand" href="index.html"><span class="ar">سامي سليمان</span><span class="en">Samy Suliman</span></a></div><div class="nav-actions"><a class="nav-btn" href="articles.html"><span class="ar">مقالات وأبحاث</span><span class="en">Articles</span></a><button class="nav-btn" id="langBtn" type="button">AR / EN</button></div></div></nav>
<main class="article-shell"><article class="container article" id="articleView"></article></main><footer class="footer">© 2026 Samy Suliman — Professional Portfolio</footer>
<script src="articles/articles-data.js"></script><script src="assets/articles-common.js"></script><script>
const slug=new URLSearchParams(location.search).get('slug'),article=SamyArticles.published().find(a=>a.slug===slug),view=document.getElementById('articleView');
function paragraphs(text){return SamyArticles.escapeHtml(text).split(/\n\s*\n/).filter(Boolean).map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('')}
function videoBlock(url,en){if(!url)return '';const id=SamyArticles.youtubeId(url);return id?'<div class="video-wrap"><iframe src="https://www.youtube-nocookie.com/embed/'+id+'" title="Video" allowfullscreen loading="lazy"></iframe></div>':'<a class="video-link" href="'+SamyArticles.escapeHtml(url)+'" target="_blank" rel="noopener">'+(en?'Watch video ↗':'مشاهدة الفيديو ↗')+'</a>'}
function render(){
 const en=document.body.classList.contains('english');
 if(!article){view.innerHTML='<div class="empty"><strong>'+(en?'Article not found':'المقال غير موجود')+'</strong><p><a href="articles.html">'+(en?'Back to articles':'العودة إلى المقالات')+'</a></p></div>';return}
 const title=SamyArticles.title(article,en),content=SamyArticles.content(article,en),summary=SamyArticles.summary(article,en)||SamyArticles.excerpt(content,155),fallback=en&&!SamyArticles.hasEnglish(article),url=location.href;
 document.title=title+' | Samy Suliman';document.getElementById('metaDesc').content=summary;document.getElementById('ogTitle').content=title;document.getElementById('ogDesc').content=summary;if(article.image)document.getElementById('ogImage').content=article.image;
 view.innerHTML='<div class="breadcrumbs"><a href="index.html">'+(en?'Portfolio':'الموقع الرئيسي')+'</a> / <a href="articles.html">'+(en?'Articles & Research':'مقالات وأبحاث')+'</a></div><h1>'+SamyArticles.escapeHtml(title)+'</h1><div class="article-meta">'+SamyArticles.formatDate(article.publishAt||article.createdAt,en)+'</div>'+(fallback?'<div class="language-note article-language-note">This article is currently available in Arabic only.</div>':'')+(article.image?'<img class="article-cover" src="'+SamyArticles.escapeHtml(article.image)+'" alt="'+SamyArticles.escapeHtml(title)+'">':'')+videoBlock(article.video,en)+'<div class="article-content">'+paragraphs(content)+'</div><div class="share"><button id="linkedinShare">LinkedIn</button><a class="x" target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text='+encodeURIComponent(title+' — '+url)+'">X</a><button id="copyLink">'+(en?'Copy link':'نسخ الرابط')+'</button></div><div class="author-box"><img src="assets/portrait-only.jpg" alt="Samy Suliman"><div><h3>'+(en?'Samy Suliman':'سامي سليمان')+'</h3><p>'+(en?'Islamic Studies educator, trainer, author, and education leader.':'معلم تربية إسلامية، ومدرب، ومؤلف، وصاحب خبرة في القيادة والتطوير التعليمي.')+'</p></div></div>';
 document.getElementById('linkedinShare').onclick=async()=>{const text=title+'\n\n'+SamyArticles.excerpt(content,220)+'\n\n'+url;try{await navigator.clipboard.writeText(text)}catch(e){}window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url),'_blank','noopener')};
 document.getElementById('copyLink').onclick=async e=>{try{await navigator.clipboard.writeText(url);e.target.textContent=en?'Copied':'تم النسخ'}catch(err){prompt(en?'Copy this link':'انسخ هذا الرابط',url)}};
}
document.getElementById('langBtn').addEventListener('click',()=>{document.body.classList.toggle('english');const en=document.body.classList.contains('english');document.documentElement.lang=en?'en':'ar';document.documentElement.dir=en?'ltr':'rtl';render()});render();
</script></body></html>
