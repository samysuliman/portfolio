<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>مقال | سامي سليمان</title>
<meta id="metaDesc" name="description" content="مقال من موقع سامي سليمان"><meta name="robots" content="index,follow"><meta property="og:type" content="article"><meta id="ogTitle" property="og:title" content="مقال | سامي سليمان"><meta id="ogDesc" property="og:description" content=""><meta id="ogImage" property="og:image" content="assets/portrait-only.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="icon" href="assets/favicon.png" type="image/png"><link rel="stylesheet" href="assets/articles.css">
</head><body>
<nav class="nav"><div class="container nav-inner"><div class="brand-wrap"><img class="avatar" src="assets/portrait-only.jpg" alt="سامي سليمان"><a class="brand" href="index.html"><span class="ar">سامي سليمان</span><span class="en">Samy Suliman</span></a></div><div class="nav-actions"><a class="nav-btn" href="articles.html"><span class="ar">مقالات وأبحاث</span><span class="en">Articles</span></a><button class="nav-btn" id="langBtn" type="button">AR / EN</button></div></div></nav>
<main class="article-shell"><article class="container article" id="articleView"></article></main><footer class="footer">© 2026 Samy Suliman — Professional Portfolio</footer>
<script src="articles/articles-data.js"></script><script src="assets/articles-common.js"></script><script>
const params=new URLSearchParams(location.search),slug=params.get('slug'),previewMode=params.get('preview')==='1';
const source=previewMode?SamyArticles.all():SamyArticles.published();
const article=source.find(a=>a.slug===slug),view=document.getElementById('articleView');
function inlineFormat(text){return SamyArticles.escapeHtml(text).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\[(.+?)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')}
function paragraphs(text){const blocks=String(text||'').split(/\n\s*\n/);return blocks.map(block=>{const b=block.trim();if(!b)return'';if(/^##\s+/.test(b))return'<h2>'+inlineFormat(b.replace(/^##\s+/,''))+'</h2>';if(/^>\s+/.test(b))return'<blockquote>'+inlineFormat(b.replace(/^>\s+/,''))+'</blockquote>';if(/^-\s+/m.test(b)){const items=b.split(/\n/).filter(x=>/^-\s+/.test(x)).map(x=>'<li>'+inlineFormat(x.replace(/^-\s+/,''))+'</li>').join('');return'<ul>'+items+'</ul>'}return'<p>'+inlineFormat(b).replace(/\n/g,'<br>')+'</p>'}).join('')}
function videoBlock(url,en){if(!url)return '';const id=SamyArticles.youtubeId(url);return id?'<div class="video-wrap"><iframe src="https://www.youtube-nocookie.com/embed/'+id+'" title="Video" allowfullscreen loading="lazy"></iframe></div>':'<a class="video-link" href="'+SamyArticles.escapeHtml(url)+'" target="_blank" rel="noopener">'+(en?'Watch video ↗':'مشاهدة الفيديو ↗')+'</a>'}
function render(){
 const en=document.body.classList.contains('english');
 if(!article){view.innerHTML='<div class="empty"><strong>'+(en?'Article not found':'المقال غير موجود')+'</strong><p><a href="articles.html">'+(en?'Back to articles':'العودة إلى المقالات')+'</a></p></div>';return}
 const l=SamyArticles.localized(article,en),url=location.href.replace(/([?&])preview=1(&|$)/,'$1').replace(/[?&]$/,'');
 document.title=l.title+' | Samy Suliman';document.getElementById('metaDesc').content=SamyArticles.excerpt(l.summary||l.content,155);document.getElementById('ogTitle').content=l.title;document.getElementById('ogDesc').content=SamyArticles.excerpt(l.summary||l.content,155);if(article.image)document.getElementById('ogImage').content=article.image;
 const warning=!l.available&&en?'<div class="translation-warning article-translation-warning">This article is currently available in Arabic only.</div>':'';
 const preview=previewMode?'<div class="preview-banner">هذه معاينة محلية للمقال قبل تصديره ونشره على GitHub.</div>':'';
 view.innerHTML=preview+'<div class="breadcrumbs"><a href="index.html">'+(en?'Portfolio':'الموقع الرئيسي')+'</a> / <a href="articles.html">'+(en?'Articles & Research':'مقالات وأبحاث')+'</a></div>'+(article.series?'<div class="article-series">'+SamyArticles.escapeHtml(article.series)+(article.number?' · '+SamyArticles.escapeHtml(article.number):'')+'</div>':'')+'<h1>'+SamyArticles.escapeHtml(l.title)+'</h1><div class="article-meta">'+SamyArticles.formatDate(article.publishAt||article.createdAt,en)+'</div>'+warning+(article.image?'<img class="article-cover" src="'+SamyArticles.escapeHtml(article.image)+'" alt="'+SamyArticles.escapeHtml(article.imageAltAr||l.title)+'">':'')+videoBlock(article.video,en)+'<div class="article-content">'+paragraphs(l.content)+'</div><div class="share"><button id="linkedinShare">LinkedIn</button><a class="x" target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text='+encodeURIComponent(l.title+' — '+url)+'">X</a><button id="copyLink">'+(en?'Copy link':'نسخ الرابط')+'</button></div><div class="author-box"><img src="assets/portrait-only.jpg" alt="Samy Suliman"><div><h3>'+(en?'Samy Suliman':'سامي سليمان')+'</h3><p>'+(en?'Islamic Studies educator, trainer, author, and education leader.':'معلم تربية إسلامية، ومدرب، ومؤلف، وصاحب خبرة في القيادة والتطوير التعليمي.')+'</p></div></div>';
 document.getElementById('linkedinShare').onclick=async()=>{const text=l.title+'\n\n'+SamyArticles.excerpt(l.summary||l.content,220)+'\n\n'+url;try{await navigator.clipboard.writeText(text)}catch(e){}window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(url),'_blank','noopener')};
 document.getElementById('copyLink').onclick=async e=>{try{await navigator.clipboard.writeText(url);e.target.textContent=en?'Copied':'تم النسخ'}catch(err){prompt(en?'Copy this link':'انسخ هذا الرابط',url)}};
}
document.getElementById('langBtn').addEventListener('click',()=>{document.body.classList.toggle('english');const en=document.body.classList.contains('english');document.documentElement.lang=en?'en':'ar';document.documentElement.dir=en?'ltr':'rtl';render()});render();</script></body></html>
